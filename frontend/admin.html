<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GoYatri Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fa;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

th{
    background:#0ea5e9;
    color:white;
    padding:18px;
    text-align:left;
}

td{
    padding:18px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f8fafc;
}

.stats-card{
    width:300px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.stats-card h2{
    color:#0ea5e9;
    font-size:40px;
}
#searchInput{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;

.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.delete-btn:hover{
    opacity:0.9;
}

.dashboard-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.dashboard-header h1{
    margin:0;
}

.dashboard-header p{
    color:#666;
}


</style>


</head>

<body>

<script>

const password = prompt("Enter Admin Password");

if(password !== "goyatri123"){

    document.body.innerHTML = `
    
    <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Poppins,sans-serif;
    ">
        <h1>Access Denied</h1>
    </div>
    
    `;

    throw new Error("Unauthorized");

}

</script>


<div class="dashboard-header">

    <div>
        <h1>GoYatri Admin Dashboard</h1>
        <p>Manage customer travel inquiries</p>
    </div>

</div>

<div class="stats-card">
    <h2 id="totalInquiries">0</h2>
    <p>Total Inquiries</p>
</div>

<input
type="text"
id="searchInput"
placeholder="Search inquiries..."
>

<table>

<thead>

<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Destination</th>
<th>Message</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<script>

fetch("https://goyatri.onrender.com/api/inquiries")

.then(res => res.json())

.then(data => {
document.getElementById("totalInquiries").innerText = data.length;

const tableBody =
document.getElementById("tableBody");

data.forEach(inquiry => {

tableBody.innerHTML += `

<tr>

<td>${inquiry.name}</td>

<td>${inquiry.email}</td>

<td>${inquiry.phone}</td>

<td>${inquiry.destination}</td>

<td>${inquiry.message}</td>

<td>${new Date(inquiry.createdAt).toLocaleDateString()}</td>

<td>
<button
onclick="deleteInquiry('${inquiry._id}')"
class="delete-btn">
Delete
</button>
</td>

</tr>

`;

});

});
document
.getElementById("searchInput")
.addEventListener("keyup", function(){

    const value =
    this.value.toLowerCase();

    const rows =
    document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {

        const text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(value)
        ? ""
        : "none";

    });

});

async function deleteInquiry(id){

    const confirmDelete =
    confirm("Are you sure you want to delete this inquiry?");

    if(!confirmDelete){
        return;
    }

    try{

        await fetch(
            `https://goyatri.onrender.com/api/inquiries/${id}`,
            {
                method:"DELETE"
            }
        );

        location.reload();

    }catch(error){

        alert("Error deleting inquiry");

        console.log(error);

    }

}

</script>

</body>
</html>
